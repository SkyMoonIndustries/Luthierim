version: '3.8'
services:
  backend:
    build: ./rest-api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - redis
      - rabbitmq

  frontend:
    build: ./luthierim-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # REDİS (Önbellekleme)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # RABBITMQ (Mesaj Kuyruğu)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"   # Haberleşme portu
      - "15672:15672" # RabbitMQ Yönetim Paneli (Hocaya şov yapacağımız ekran)